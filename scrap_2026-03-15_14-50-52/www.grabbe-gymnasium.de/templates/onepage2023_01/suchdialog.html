<!doctype html>
<html style="width: 100%; height: 100%;">
  <head>
    <title>Suchdialog</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, minimal-ui, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <script>
      url = "https://www.bing.com/search?q=";
      subsite = " site:www.grabbe-gymnasium.de";
    </script>
  </head>
  <body style="width: 100%; height: 100%; margin: 0; overflow: hidden;">
    <br><br><br><br>
    <input id="searchText" style="display: block; margin: auto; width: 800px; max-width: 95%; font-size:24px;" type="text" placeholder="Hier Suchtext eingeben...">
    <br>
    <div style="display: block; margin: auto; width: 800px; max-width: 95%; font-size:20px;">Suche eingrenzen:<br>
      
      <span><input name="subsite" type="radio" onchange="subsite=' site:www.grabbe-gymnasium.de/infos/organisation';">Wer, was, wo? &nbsp;&nbsp;&nbsp;</span>

      <span><input name="subsite" type="radio" onchange="subsite=' site:www.grabbe-gymnasium.de/cms_hp/newsarchiv';">Nachrichten &nbsp;&nbsp;&nbsp;</span>
      <br><span><input name="subsite" type="radio" onchange="subsite=' site:www.grabbe-gymnasium.de/medien/kalender/schuljahresplan.php';">Termine &nbsp;&nbsp;&nbsp;</span>
      <span><input name="subsite" type="radio" onchange="subsite=' site:www.grabbe-gymnasium.de/infos/unterricht';">Unterricht &nbsp;&nbsp;&nbsp;</span>
      <br><span><input name="subsite" type="radio" onchange="subsite=' site:www.grabbe-gymnasium.de/oberstufe2';">Oberstufe &nbsp;&nbsp;&nbsp;</span>
      <span><input name="subsite" type="radio" checked onchange="subsite=' site:www.grabbe-gymnasium.de';">Startseite &nbsp;&nbsp;&nbsp;</span>
    </div>
    <br>
    <input style="display: block; margin: auto; width: 800px; max-width: 95%; font-size:24px;" type="button" value="Suchen"
       onclick="window.location.href=url+searchText.value+subsite;"
    >
    <br><br>
    <p style="background-color: orange; display: block; margin: auto; padding: 10px; width: 800px; max-width: 95%; font-size:24px;">Du kannst auch ganze Fragen eingeben:</p>
    <p style="background-color: orange; display: block; margin: auto; padding: 10px; width: 800px; max-width: 95%; font-size:24px;">Klicke im Suchergebnis oben links auf <b>CP SUCHEN</b>, um den Chat-Bot zu starten!</p>
  </body>
</html>
