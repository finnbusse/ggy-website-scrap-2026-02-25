# .github/workflows/scrape.yml
name: 🕷️ Scrape School Website
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install tqdm

      - name: 🕷️ Scrape with progress
        run: python scrape.py

      - name: 📊 Show summary
        run: |
          echo "=== SCRAPE SUMMARY ==="
          find ./mirror -type f | wc -l | xargs echo "Total files:"
          find ./mirror -name "*.html" | wc -l | xargs echo "HTML pages:"
          find ./mirror -name "*.pdf" | wc -l | xargs echo "PDFs:"
          find ./mirror -name "*.jpg" -o -name "*.png" -o -name "*.gif" | wc -l | xargs echo "Images:"
          du -sh ./mirror | xargs echo "Total size:"

      - name: 💾 Commit mirror to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./mirror
          git commit -m "🕷️ Scraped $(date +'%Y-%m-%d %H:%M') – $(find ./mirror -type f | wc -l) files" || echo "Nothing to commit"
          git push
