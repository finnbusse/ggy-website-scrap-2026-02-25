# .github/workflows/scrape.yml
name: 🕷️ Scrape School Website
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: 🔧 Configure Git LFS
        run: git lfs install

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # lxml is required for both HTML parsing (lxml) and XML/sitemap
          # parsing (lxml-xml parser used by BeautifulSoup for XML content)
          pip install rich requests beautifulsoup4 lxml

      - name: 🕷️ Run scraper
        run: python -u scrape.py

      - name: 💾 Commit scrap folder to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./scrap_* ./scrape-report.json
          git commit -m "🕷️ Scrape $(date +'%Y-%m-%d %H:%M') – $(find ./scrap_* -type f 2>/dev/null | wc -l) files" || echo "Nothing to commit"
          # Retry push up to 5 times with rebase to handle concurrent updates
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && echo "Push succeeded on attempt $i" && break || {
              echo "Push attempt $i failed, retrying in 15s..."
              sleep 15
            }
          done
          git log --oneline -1 || true
