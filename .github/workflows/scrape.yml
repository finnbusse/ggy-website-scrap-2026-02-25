# .github/workflows/scrape.yml
name: 🕷️ Scrape School Website
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # lxml is required for both HTML parsing (lxml) and XML/sitemap
          # parsing (lxml-xml parser used by BeautifulSoup for XML content)
          pip install rich requests beautifulsoup4 lxml

      - name: 🕷️ Run scraper
        run: python -u scrape.py

      - name: 💾 Commit mirror to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./mirror ./scrape-report.json
          git commit -m "🕷️ Scrape $(date +'%Y-%m-%d %H:%M') – $(find ./mirror -type f | wc -l) files" || echo "Nothing to commit"
          git pull --rebase origin main
          git push
