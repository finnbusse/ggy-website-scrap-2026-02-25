# .github/workflows/scrape.yml
name: 🕷️ Scrape School Website
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: 🔧 Configure Git LFS
        run: git lfs install

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # lxml is required for both HTML parsing (lxml) and XML/sitemap
          # parsing (lxml-xml parser used by BeautifulSoup for XML content)
          pip install rich requests beautifulsoup4 lxml

      - name: 🕷️ Run scraper
        run: python -u scrape.py

      - name: 💾 Commit files and archive to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          FILE_COUNT=$(find ./scrap_*/ -type f 2>/dev/null | wc -l)
          # Number of loose files to stage per commit/push.
          # Keeping batches small ensures each individual push stays well
          # below GitHub's 2 GB pack-file limit, and means earlier batches
          # are already saved even if a later batch fails.
          BATCH_SIZE=500
          BATCH_NUM=0

          # --------------- push helper (retries with rebase) ----------------
          push_with_retry() {
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push \
                && echo "Push succeeded on attempt $i" && return 0 || {
                  echo "Push attempt $i failed, retrying in 15s..."
                  sleep 15
                }
            done
            echo "⚠️  All push attempts failed for this batch!"
            return 1
          }

          # --------------- 1. Metadata files (always small) -----------------
          git add ./scrape-report.json ./sitemap.xml 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "🕷️ Scrape $TIMESTAMP – metadata ($FILE_COUNT files scraped)"
            push_with_retry
          fi

          # --------------- 2. Scraped content (batched) ---------------------
          # Collect every new or modified file under the scrap directories.
          # .tar.gz archives are excluded via .gitignore (they can exceed the
          # 2 GB GitHub LFS per-object limit).
          mapfile -d '' ALL_FILES < <(
            git ls-files --others --exclude-standard -z -- './scrap_*/' 2>/dev/null
            git ls-files --modified              -z -- './scrap_*/' 2>/dev/null
          )

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "Scraped files to commit: $TOTAL_FILES"

          for (( i = 0; i < TOTAL_FILES; i += BATCH_SIZE )); do
            CHUNK=("${ALL_FILES[@]:$i:$BATCH_SIZE}")
            git add "${CHUNK[@]}"

            if git diff --cached --quiet; then
              continue
            fi

            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH_END=$(( i + ${#CHUNK[@]} ))
            git commit -m "🕷️ Scrape $TIMESTAMP – batch $BATCH_NUM (files $(( i + 1 ))–$BATCH_END of $TOTAL_FILES)"
            push_with_retry || echo "⚠️  Batch $BATCH_NUM push failed; continuing with next batch"
          done

          echo "Finished: $BATCH_NUM batch(es) pushed, $FILE_COUNT total files."
          git log --oneline -3 || true
