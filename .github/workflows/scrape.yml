# .github/workflows/scrape.yml
name: 🕷️ Scrape School Website
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: 🔧 Configure Git LFS
        run: git lfs install

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # lxml is required for both HTML parsing (lxml) and XML/sitemap
          # parsing (lxml-xml parser used by BeautifulSoup for XML content)
          pip install rich requests beautifulsoup4 lxml

      - name: 🕷️ Run scraper
        run: python -u scrape.py

      - name: 💾 Commit files and open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e  # Never abort the job on a single git error

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          TIMESTAMP_SAFE=$(date +'%Y%m%d-%H%M%S')
          FILE_COUNT=$(find ./scrap_*/ -type f 2>/dev/null | wc -l)
          BRANCH="scrape/standard-${TIMESTAMP_SAFE}"
          BATCH_SIZE=500
          BATCH_NUM=0

          # --------------- 1. Create a unique branch for this scrape run -----
          git checkout -b "$BRANCH"

          # --------------- 2. Metadata files (always small) -----------------
          git add ./scrape-report.json ./sitemap.xml 2>/dev/null || true
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "🕷️ Scrape $TIMESTAMP – metadata ($FILE_COUNT files scraped)" || true
          fi

          # --------------- 3. Scraped content (batched commits) -------------
          mapfile -d '' ALL_FILES < <(
            git ls-files --others --exclude-standard -z -- './scrap_*' 2>/dev/null
            git ls-files --modified              -z -- './scrap_*' 2>/dev/null
          )

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "Scraped files to commit: $TOTAL_FILES"

          for (( i = 0; i < TOTAL_FILES; i += BATCH_SIZE )); do
            CHUNK=("${ALL_FILES[@]:$i:$BATCH_SIZE}")
            git add "${CHUNK[@]}" 2>/dev/null || true

            if git diff --cached --quiet 2>/dev/null; then
              continue
            fi

            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH_END=$(( i + ${#CHUNK[@]} ))
            git commit -m "🕷️ Scrape $TIMESTAMP – batch $BATCH_NUM (files $(( i + 1 ))–$BATCH_END of $TOTAL_FILES)" || true
          done

          # --------------- 4. Push branch & open PR -------------------------
          if [ "$BATCH_NUM" -gt 0 ] || ! git diff --quiet HEAD origin/main 2>/dev/null; then
            git push origin "$BRANCH" || {
              echo "⚠️  Push failed"; exit 0
            }
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "🕷️ Scrape $TIMESTAMP ($FILE_COUNT files)" \
              --body "Automated scrape run (**standard scraper**) – $TIMESTAMP

          **Files scraped:** $FILE_COUNT
          **Batches:** $BATCH_NUM

          > Merge this PR to add the scraped data to main." \
            || echo "⚠️  PR creation failed (branch was pushed – you can create the PR manually)"
          else
            echo "Nothing to commit – no PR needed."
          fi

          echo "Finished: $BATCH_NUM batch(es) committed, $FILE_COUNT total files."
          git log --oneline -3 || true
          exit 0
