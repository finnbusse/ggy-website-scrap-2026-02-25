<!DOCTYPE html>
<html style="width: 100%; height: 100%;">
    <head>
        <title>Verzeichnisanzeige</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            @font-face {font-family: JosefinSans; font-style: normal; font-weight: 100; src:url("JosefinSans-Thin.ttf") format("truetype");}
            @font-face {font-family: JosefinSansB; font-style: normal; font-weight: 300; src:url("JosefinSans-Light.ttf") format("truetype");}
            @font-face {font-family: RobotoCondensed; font-style: normal; font-weight: 400; src:url("http://www.grabbe-gymnasium.de/wpii/09/mainf/RobotoCondensed-Light.ttf") format("truetype");}
            .container {padding-left: 8%; padding-right: 8%;}
            div {font-size: 14px; color: lightblue; font-family: RobotoCondensed;}
            .small {
                width: 94%;
                height : 125px;
            }
            .wide {
                width: 99%;
                overflow-y: auto;
            }
            .tall {
                width: 94%;
                height: 35%;
            }
            a:link {color: white;} a:visited {color: grey;}a:hover {color: blue;}
            /* First breakpoint at formerly 844, changed for surface duo emulator  */   
            @media all and (min-width: 760px){
                               
                .small {
                    width: 44%;
                    height : 125px;
                }
                .wide {
                    width: 99%;
                    
                }
                .tall {
                    width: 42%;
                    height: 66%;
                }
            }
            /* First breakpoint at 576px */
            @media all and (min-width: 1100px){
                div {font-size: 16px;}   
                .small {
                    width: 30%; /*overflow-y: visible;*/
                    height : 125px;
                }
                .wide {
                    width: 64%; height: 32%; padding: 10px;
                    display: inline-block;
                }
                .tall {
                    width: 30%;
                    height: 66%;
                }
            }
            @media all and (min-width: 1450px){
                .container {padding-left: 2.5%; padding-right: 0.0%;}

                div {font-size: 18px;}   
                .small {
                    width: 22%; /*overflow-y: visible;*/
                    height : 125px;
                }
                .wide {
                    width: 65%; height: 32%; padding: 10px;
                    display: inline-block;
                }
                .tall {
                    width: 18%;
                    height: 66%;
                }
            }
            ::-webkit-scrollbar {
                width: 7px;
                height: 7px;
                background-color: rgba(55,55,55, 0.5);
                border-radius: 100px;
            }
            ::-webkit-scrollbar:hover {
                width: 9px;
                background: blue;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(85,85,85, 0.5);
                border-radius: 100px;
            }

            ::-webkit-scrollbar-thumb:hover,
            ::-webkit-scrollbar-thumb:active  {
                background: orange;
            }
        </style>
    </head>
