            /** Changes Position of Circle by random or by x and y values 
             * 
             * @param {DOM element} value is node to be moved
             * @param {int} x is value to move in x direction, if 0 them randomly
             * @param {int} y see x
             * @returns {undefined}
             */
            function posCircle(value,x,y) {
                var oldPosX = value.getAttribute('cx');
                var oldPosY = value.getAttribute('cy');
                var rndPosX = x>6?x:x-(-oldPosX);
                var rndPosY = y>6?y:y-(-oldPosY);
                for (var i = 0; i < edges.length; i++) {
                    var changed = false;
                    if (edges[i].getAttribute('x1') === oldPosX && edges[i].getAttribute('y1') === oldPosY) {
                        edges[i].setAttribute('x1', rndPosX);
                        edges[i].setAttribute('y1', rndPosY); changed = true;
                    }
                    if (edges[i].getAttribute('x2') === oldPosX && edges[i].getAttribute('y2') === oldPosY) {
                        edges[i].setAttribute('x2', rndPosX);
                        edges[i].setAttribute('y2', rndPosY); changed = true;
                    }
                    if (changed) {
                        //edges[i].parentNode.lastElementChild.innerHTML = "changed";
                        var weight = Math.sqrt(Math.pow(edges[i].getAttribute('x2')-edges[i].getAttribute('x1'),2)+Math.pow(edges[i].getAttribute('y2')-edges[i].getAttribute('y1'),2));
                        var compX = (parseInt(edges[i].getAttribute('x1'))+parseInt(edges[i].getAttribute('x2')))/2;
                        var compY = (parseInt(edges[i].getAttribute('y1'))+parseInt(edges[i].getAttribute('y2')))/2;
                        //tLText.appendChild(document.createTextNode(parseInt(weight*10)/10));
                        edges[i].parentNode.lastElementChild.setAttribute("y",compY);
                        edges[i].parentNode.lastElementChild.setAttribute("x",compX);
                        edges[i].parentNode.lastElementChild.innerHTML = parseInt(weight*10)/10;
                    }
                    // hier text von line pos anpassen !!!!!!!!!!!!!!!!!!!!!!!!!!!
                }
                value.setAttribute('cx', rndPosX);
                value.setAttribute('cy', rndPosY);
                value.parentNode.lastElementChild.setAttribute('x', rndPosX - 6);
                value.parentNode.lastElementChild.setAttribute('y', rndPosY + 5);

            }

                           var tLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                           var tLText = document.createElementNS('http://www.w3.org/2000/svg','text');

                           tLine.setAttribute('x1', nodes[tTemp].getAttribute('cx'));
                           tLine.setAttribute('y1', nodes[tTemp].getAttribute('cy'));

var weight = Math.sqrt(Math.pow(tLine.getAttribute('x2')-tLine.getAttribute('x1'),2)+Math.pow(tLine.getAttribute('y2')-tLine.getAttribute('y1'),2));
                           tLine.setAttribute('data-weight', 1); // weight); // Attribut name gibt es in SVG
                           tLine.setAttribute('stroke-width', '4px');
                           tLText.setAttribute('x',parseInt((parseInt(tLine.getAttribute('x1'))+parseInt(tLine.getAttribute('x2')))/2)); // doppel parseInt ist unn�tig, sollte TextNode gelten
                           tLText.setAttribute('y',parseInt((parseInt(tLine.getAttribute('y1'))+parseInt(tLine.getAttribute('y2')))/2));
                           tLText.setAttribute('font-size',24);
                           tLText.appendChild(document.createTextNode(parseInt(weight*10)/10));
                           tLGroup.appendChild(tLine);
                           tLGroup.appendChild(tLText);
                           svg.appendChild(tLGroup); //svg.appendChild(tLine); svg.appendChild(tLText);
                           edges.push(tLine);
                           svg.removeChild(nodes[tTemp].parentNode);
                           svg.appendChild(nodes[tTemp].parentNode);
                           svg.removeChild(nodes[nodes.length - 1].parentNode);
                           svg.appendChild(nodes[nodes.length - 1].parentNode);

                       }
                       var tText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                       tText.setAttribute('x', nodes[nodes.length - 1].getAttribute('cx') - 6);

                       nodes[nodes.length - 1].parentNode.appendChild(tText);
                       return tCircle;  // - x , damit im Zentrum ; wie geht svg.innerHTML ??
            }
